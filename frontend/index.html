<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EBLG Dashboard</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

    <!-- Style -->
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet JS (charge une seule fois !) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- PolylineDecorator -->
   <script src="libs/leaflet.polyline-decorator.min.js"></script>

    <!-- Heatmap plugin (OBLIGATOIRE pour L.heatLayer) -->
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

</head>

<body>

    <div id="app-container">

        <!-- SIDEBAR -->
        <div id="sidebar" class="glass sidebar-expanded">

            <div id="sidebar-header">
                <h2>EBLG Dashboard</h2>
                <button id="sidebar-toggle">☰</button>
            </div>

            <div class="sb-section glass">
                <h3>METAR</h3>
                <div id="metar"></div>
            </div>

            <div class="sb-section glass">
                <h3>TAF</h3>
                <div id="taf"></div>
            </div>

            <div class="sb-section glass">
                <h3>Piste active</h3>
                <div id="runway-panel"></div>
            </div>
            
            <button id="toggle-heatmap" class="glass">Heatmap ON/OFF</button>
            <button id="play-history" class="glass">Rejouer historique</button>
            <button id="toggle-clusters" class="glass">Clusters ON/OFF</button>


            <div class="sb-section glass">
                <h3>État des services</h3>
                <div id="status-panel"></div>
            </div>

            <!-- SONOMÈTRES -->
            <div id="sono-panel" class="glass collapsed">
                <div id="sono-header">
                    <span>Sonomètres</span>
                    <button id="sono-toggle">⯈</button>
                </div>

                <div id="sono-stats"></div>
                <canvas id="sono-chart" width="220" height="60"></canvas>
                <div id="sono-list"></div>
            </div>

            <div class="sb-section glass">
                <h3>FIDS</h3>
                <div id="fids"></div>
            </div>

            <button id="reset-map" class="glass">Reset carte</button>
        </div>

        <!-- CONTENU PRINCIPAL -->
        <div id="main">
            <h2>Carte</h2>
            <div id="map"></div>

            <!-- PANNEAU DÉTAIL SONOMÈTRE -->
            <div id="detail-panel" class="glass hidden">
                <h3 id="detail-title"></h3>
                <p><b>Adresse :</b> <span id="detail-address"></span></p>
                <p><b>Commune :</b> <span id="detail-town"></span></p>
                <p><b>Statut :</b> <span id="detail-status"></span></p>
                <p><b>Distance piste :</b> <span id="detail-distance"></span></p>
            </div>
        </div>

    </div>

    <div id="debug-panel" class="glass debug">
    <div>FPS: <span id="fps"></span></div>
    <div>CPU: <span id="cpu"></span></div>
    <div>Render: <span id="render"></span> ms</div>
</div>


    <!-- Script principal -->
    <script type="module" src="app.js?v=82"></script>

</body>
</html>
